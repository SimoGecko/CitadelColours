<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Color Finder</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 600px;
      margin: 2rem auto;
      padding: 1rem;
      line-height: 1.5;
    }
    h1 {
      text-align: center;
    }
    input {
      width: 100%;
      padding: 0.5rem;
      box-sizing: border-box;
      font-size: 1rem;
      margin-bottom: 1rem;
    }
    #swatch {
      width: 100%;
      height: 150px;
      border: 1px solid #ccc;
      margin-bottom: 1rem;
      border-radius: 8px;
    }
    .result { margin: 0.3rem 0; }
    .paint {
      display: flex;
      align-items: center;
      margin: 0.5rem 0;
    }
    .paint-swatch {
      width: 40px;
      height: 25px;
      border: 1px solid #000;
      margin-right: 0.5rem;
      border-radius: 4px;
    }
.rgb-bar {
  display: flex;
  gap: 2px;
  align-items: flex-end; /* bars grow from bottom */
  height: 50px;          /* total chart height */
  margin-left: 8px;      /* space from numbers */
}

.bar {
  flex: 1;               /* equal width */
  border-radius: 2px 2px 0 0;
}

.bar.red { background: red; }
.bar.green { background: green; }
.bar.blue { background: blue; }
  </style>
</head>
<body>
  <h1>Color Finder</h1>
  <input id="search" type="text" placeholder="Enter HEX, RGB, HSL, or paint name…">
  <div id="swatch"></div>
  <div id="output"></div>
  <a id="encycolorpedia"></a>
  <div id="matches"></div>

  <script src="https://unpkg.com/chroma-js@2.4.2/chroma.min.js"></script>
  <script>
    // see https://gka.github.io/chroma.js/
    let paints = {};

    function LRV(color) {
      // Relative luminance (Y from XYZ, approximated)
      const rgb = chroma(color).rgb().map(v => v/255);
      const srgb = rgb.map(c => (c <= 0.03928 ? c/12.92 : ((c+0.055)/1.055)**2.4));
      const Y = 0.2126*srgb[0] + 0.7152*srgb[1] + 0.0722*srgb[2];
      return Y;
      //return (Y*100).toFixed(1);
    }

    // NOTES: Blue out seems incorrect
    function rgbToRyb(r, g, b) {
      // r, g, b are 0–255
      // normalize to 0–1
      r /= 255; g /= 255; b /= 255;

      // Extract whiteness
      const w = Math.min(r, g, b);
      r -= w; g -= w; b -= w;

      const maxG = Math.max(r, g, b);

      // Rotate green and blue into yellow
      let y = Math.min(r, g);
      r -= y; g -= y;

      if (b > 0 && g > 0) {
        b /= 2; g /= 2;
      }

      y += g; g = 0;

      // Normalize to max
      const maxY = Math.max(r, y, b);
      if (maxY > 0) {
        const n = maxG / maxY;
        r *= n; y *= n; b *= n;
      }

      // Add whiteness back
      r += w; y += w; b += w;

      // Scale to 0–255
      return [r, y, b];
    }

    function closestPaints(hex, n=3) {
      //let inputLab = chroma(hex).lab();
      return Object.entries(paints)
        .map(([name, color]) => {
          //let lab = chroma(color).lab();
          return {
            name,
            color,
            deltaE:  chroma.deltaE(hex, color) //deltaE(inputLab, lab).toFixed(2)
          };
        })
        .sort((a,b) => a.deltaE - b.deltaE)
        .slice(0,n);
    }

    function updateColor(value) {
      let color;
      try {
        if (paints[value]) {
          color = paints[value];
        } else {
          color = chroma(value).hex();
        }
      } catch {
        document.getElementById("output").textContent = "Invalid color input.";
        return;
      }

      // Update URL
      const params = new URLSearchParams(window.location.search);
      params.set("q", value);
      history.replaceState({}, "", `${location.pathname}?${params}`);

      // Update swatch
      document.getElementById("swatch").style.background = color;

      // Show conversions
      const c = chroma(color);

      const hex = c.hex();
      //const css = c.css();
      const name = c.name();
      const rgb = c.rgb();//.map(Math.round);
      const hsl = c.hsl();
      const hsv = c.hsv();
      const cmyk = c.cmyk();//rgbToCmyk(...rgb);
      const lab = c.lab();
      const lrv = LRV(color);
      const lch = c.lch();
      //const xyz = c.xyz();
      const ryb = rgbToRyb(...rgb)

      function p(x) { return (x*100).toFixed(1) + "%";}

      const maxHeight = 10;
      const rgbBars = `
        <div class="rgb-bar">
          <div class="bar red" style="height:${rgb[0]/255*maxHeight}px"></div>
          <div class="bar green" style="height:${rgb[1]/255*maxHeight}px"></div>
          <div class="bar blue" style="height:${rgb[2]/255*maxHeight}px"></div>
        </div>
      `;

      document.getElementById("output").innerHTML = `
        <h3>Conversions</h3>
        <table border="1" cellpadding="6" cellspacing="0" style="border-collapse:collapse; width:100%;">
          <tr><td><b>HEX</b></td>    <td>${hex}</td></tr>
          <tr><td><b>RGB</b></td>    <td>${rgb[0]}, ${rgb[1]}, ${rgb[2]}</td></tr>
          <tr><td><b>HSL</b></td>    <td>${hsl[0].toFixed(1)}°, ${p(hsl[1])}, ${p(hsl[2])}</td></tr>
          <tr><td><b>HSV/HSB</b></td><td>${hsv[0].toFixed(1)}°, ${p(hsv[1])}, ${p(hsv[2])}</td></tr>
          <tr><td><b>CMYK</b></td>   <td>${p(cmyk[0])}, ${p(cmyk[1])}, ${p(cmyk[2])}, ${p(cmyk[3])}</td></tr>
          <tr><td><b>LAB</b></td>    <td>${lab[0].toFixed(3)}, ${lab[1].toFixed(3)}, ${lab[2].toFixed(3)}</td></tr>
          <tr><td><b>RYB</b></td>    <td>${p(ryb[0])}, ${p(ryb[1])}, ${p(ryb[2])}</td></tr>
          <tr><td><b>LRV</b></td>    <td>${p(lrv)}</td></tr>
        </table>
      `;

      document.getElementById("encycolorpedia").href = `https://encycolorpedia.com/` + hex.replace(/^#/, "");

      // Show closest paints
      const nearest = closestPaints(color);
      document.getElementById("matches").innerHTML = "<h3>Closest paints:</h3>" + nearest.map(p => `
        <div class="paint">
          <div class="paint-swatch" style="background:${p.color}"></div>
          ${p.name} (${p.color}, ΔE=${p.deltaE})
        </div>
      `).join("");
    }

    async function init() {
      // Load paints JSON
      //const resp = await fetch("paints.json");
      //paints = await resp.json();

      const search = document.getElementById("search");
      search.addEventListener("change", e => updateColor(e.target.value));

      // Enter key triggers
      search.addEventListener("keydown", e => {
        if (e.key === "Enter") {
          e.preventDefault(); // stop the form from submitting/reloading
          updateColor(search.value);
        }
      });

      // Also on blur / change
      search.addEventListener("change", e => updateColor(e.target.value));

      // Load from URL if present
      const params = new URLSearchParams(window.location.search);
      if (params.has("q")) {
        const q = params.get("q");
        search.value = q;
        updateColor(q);
      }
    }

    init();
  </script>
</body>
</html>
