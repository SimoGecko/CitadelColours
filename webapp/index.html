<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Color Finder</title>
  <link rel="icon" type="image/gif" href="favicon.gif">
  <style>
    body {
      font-family: sans-serif;
      max-width: 600px;
      margin: 2rem auto;
      padding: 1rem;
      line-height: 1.5;
    }
    h1 {
      text-align: center;
    }
    input {
      width: 100%;
      padding: 0.5rem;
      box-sizing: border-box;
      font-size: 1rem;
      margin-bottom: 1rem;
    }
    #swatch {
      width: 100%;
      height: 150px;
      border: 1px solid #ccc;
      margin-bottom: 1rem;
      border-radius: 8px;
    }
    .result { margin: 0.3rem 0; }
    .color {
      display: flex;
      align-items: center;
      margin: 0.5rem 0;
    }
    .color-swatch {
      width: 40px;
      height: 25px;
      border: 1px solid #000;
      margin-right: 0.5rem;
      border-radius: 4px;
    }
    .rgb-bar {
      display: flex;
      gap: 2px;
      align-items: flex-end; /* bars grow from bottom */
      height: 50px;          /* total chart height */
      margin-left: 8px;      /* space from numbers */
    }

    .bar {
      flex: 1;               /* equal width */
      border-radius: 2px 2px 0 0;
    }

    .bar.red { background: red; }
    .bar.green { background: green; }
    .bar.blue { background: blue; }

    #colorDropdown {
      padding: 0.2rem;
      font-size: 1rem;
      font-family: sans-serif;
      border-radius: 6px;
      border: 1px solid #ccc;
      background-color: #fff;
      cursor: pointer;
      outline: none;
    }
  </style>
</head>
<body>
  <h1>Color Finder</h1>
  <a href="">Color sets</a>
  <input id="search" type="text" placeholder="Enter HEX, RGB, HSL, or paint name…">
  <div id="message"></div>

  <div id="content" style="visibility:hidden;">
    <div id="swatch"></div>
    <div id="exactMatches"></div>
    <div id="output"></div>
    <a id="link"></a>
    <div id="charts"></div>
    <div id="matches"></div>
  </div>


  <script src="https://unpkg.com/chroma-js@2.4.2/chroma.min.js"></script>
  <script src="../data/ral_colors.json"></script>
  <script src="../data/citadel_colors.json"></script>
  <script src="../data/citadelsampled_colors.json"></script>
  <script src="../data/twothincoats_colors.json"></script>
  <script>
    // see https://gka.github.io/chroma.js/
    colorSets = {}
    colorSets["RAL"] = ral_colors;
    colorSets["Citadel"] = citadel_colors;
    colorSets["Citadel (sampled)"] = citadel_colors_sampled;
    colorSets["Two Thin Coats"] = twothincoats_colors;

    function LRV(color) {
      // Relative luminance (Y from XYZ, approximated)
      const rgb = chroma(color).rgb().map(v => v/255);
      const srgb = rgb.map(c => (c <= 0.03928 ? c/12.92 : ((c+0.055)/1.055)**2.4));
      const Y = 0.2126*srgb[0] + 0.7152*srgb[1] + 0.0722*srgb[2];
      return Y;
    }

    // NOTES: Blue out seems incorrect
    function rgbToRyb(r, g, b) {
      // r, g, b are 0–255
      // normalize to 0–1
      r /= 255; g /= 255; b /= 255;

      // Extract whiteness
      const w = Math.min(r, g, b);
      r -= w; g -= w; b -= w;

      const maxG = Math.max(r, g, b);

      // Rotate green and blue into yellow
      let y = Math.min(r, g);
      r -= y; g -= y;

      if (b > 0 && g > 0) {
        b /= 2; g /= 2;
      }

      y += g; g = 0;

      // Normalize to max
      const maxY = Math.max(r, y, b);
      if (maxY > 0) {
        const n = maxG / maxY;
        r *= n; y *= n; b *= n;
      }

      // Add whiteness back
      r += w; y += w; b += w;

      // Scale to 0–255
      return [r, y, b];
    }

    function fuzzyEqStr(a, b) {
      a = a.toLowerCase(); b = b.toLowerCase();
      const m = a.length, n = b.length;
      const dp = Array.from({length:m+1}, (_,i)=>Array(n+1).fill(0));
      for(let i=0;i<=m;i++) dp[i][0]=i;
      for(let j=0;j<=n;j++) dp[0][j]=j;
      for(let i=1;i<=m;i++) for(let j=1;j<=n;j++)
        dp[i][j] = a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
      return 1 - dp[m][n]/Math.max(m,n);
    }

    function findColorInSets(value, threshold=0.5) {
      let best = null, bestScore = 0;
      for(const set of Object.values(colorSets))
        for(const [name, hex] of Object.entries(set)) {
          const score = fuzzyEqStr(value, name);
          if(score>bestScore) { bestScore=score; best=hex; }
        }
      return bestScore>=threshold ? best : null;
    }

    function closestColors(colors, hex, n=3) {
      return Object.entries(colors)
      .map(([name, color]) => {
        return {
          name,
          color,
          deltaE:  chroma.deltaE(hex, color)
        };
      })
      .sort((a,b) => a.deltaE - b.deltaE)
      .slice(0,n);
    }

    function findExactMatches(hex) {
      hex = chroma(hex).hex().toLowerCase(); // normalize
      const matches = [];

      for (const [setName, setColors] of Object.entries(colorSets)) {
        for (const [name, colorHex] of Object.entries(setColors)) {
          if (chroma(colorHex).hex().toLowerCase() === hex) {
            matches.push({ set: setName, name, hex: colorHex });
          }
        }
      }

      return matches; // empty array if none
    }

    function updateColor(value) {
      // Update URL
      const params = new URLSearchParams(window.location.search);
      params.set("q", value);
      history.replaceState({}, "", `${location.pathname}?${params}`);

      let color;
      try {
        const found = findColorInSets(value);
        if (found) {
          color = found;
        } else {
          color = chroma(value).hex(); // fallback to interpreting as hex/rgb/hsl
        }

        document.getElementById("message").textContent = "";
        document.getElementById("content").style.visibility = "";
      } catch {
        document.getElementById("message").textContent = "No color found.";
        document.getElementById("content").style.visibility = "hidden";
        return;
      }

      // find exact
      const exactMatches = findExactMatches(color);

      if (exactMatches.length) {
        document.getElementById("exactMatches").innerHTML =
          "<h3>Exact matches:</h3>" +
          exactMatches.map(m =>
            `<div class="color">
              <div class="color-swatch" style="background:${m.hex}"></div>
              ${m.name} (${m.set})
            </div>`).join("");
      } else {
        document.getElementById("exactMatches").innerHTML = "";
      }

      // Update swatch
      document.getElementById("swatch").style.background = color;

      // Show conversions
      const c = chroma(color);

      const hex = c.hex();
      //const css = c.css();
      const name = c.name();
      const rgb = c.rgb();//.map(Math.round);
      const hsl = c.hsl();
      const hsv = c.hsv();
      const cmyk = c.cmyk();
      const lab = c.lab();
      const lrv = LRV(color);
      const lch = c.lch();
      //const xyz = c.xyz();
      const ryb = rgbToRyb(...rgb)

      function p(x) { return (x*100).toFixed(1) + "%";}

      const maxHeight = 10;
      const rgbBars = `
        <div class="rgb-bar">
          <div class="bar red" style="height:${rgb[0]/255*maxHeight}px"></div>
          <div class="bar green" style="height:${rgb[1]/255*maxHeight}px"></div>
          <div class="bar blue" style="height:${rgb[2]/255*maxHeight}px"></div>
        </div>
      `;

      function safeHue(h) {
        return isNaN(h) ? 0 : h;
      }

      document.getElementById("output").innerHTML = `
        <h3>Conversions</h3>
        <table border="1" cellpadding="6" cellspacing="0" style="border-collapse:collapse; width:100%;">
          <tr><td><b>HEX</b></td>    <td>${hex}</td></tr>
          <tr><td><b>RGB</b></td>    <td>${rgb[0]}, ${rgb[1]}, ${rgb[2]}</td></tr>
          <tr><td><b>HSL</b></td>    <td>${safeHue(hsl[0]).toFixed(1)}°, ${p(hsl[1])}, ${p(hsl[2])}</td></tr>
          <tr><td><b>HSV/HSB</b></td><td>${safeHue(hsv[0]).toFixed(1)}°, ${p(hsv[1])}, ${p(hsv[2])}</td></tr>
          <tr><td><b>CMYK</b></td>   <td>${p(cmyk[0])}, ${p(cmyk[1])}, ${p(cmyk[2])}, ${p(cmyk[3])}</td></tr>
          <tr><td><b>LAB</b></td>    <td>${lab[0].toFixed(3)}, ${lab[1].toFixed(3)}, ${lab[2].toFixed(3)}</td></tr>
          <tr><td><b>RYB</b></td>    <td>${p(ryb[0])}, ${p(ryb[1])}, ${p(ryb[2])}</td></tr>
          <tr><td><b>LRV</b></td>    <td>${p(lrv)}</td></tr>
        </table>
      `;

      document.getElementById("link").href = `https://encycolorpedia.com/` + hex.replace(/^#/, "");
      document.getElementById("link").innerHTML = `Encycolorpedia.com`;

      // Show charts
      document.getElementById("charts").innerHTML = "<h3>Charts:</h3>";

      // Show closest colors
      updateClosestColors(color);
    }

    function updateClosestColors(color) {
      let currentSet = localStorage.getItem("currentSet") || "Citadel";

      let options = Object.keys(colorSets).map(k => 
        `<option value="${k}" ${currentSet === k ? "selected" : ""}>${k}</option>`
        ).join("");

      const colorDropdown = `<select id="colorDropdown">${options}</select>`;
      const nearest = closestColors(colorSets[currentSet], color, 6);

      const nearestRows = nearest.map(p => `
        <tr>
          <td style="padding:4px 3px;">
            <a href="?q=${encodeURIComponent(p.color)}" style="display:flex; align-items:center; text-decoration:none; color:inherit;">
              <div class="color-swatch" style="background:${p.color}; margin-right:0.5rem;"></div>
              ${p.name}
            </a>
          </td>
          <td>${p.color.toLowerCase()}</td>
          <td>${p.deltaE.toFixed(2)}</td>
        </tr>
      `).join("");

      document.getElementById("matches").innerHTML = `
        <h3>Closest colors:</h3>
        ${colorDropdown}
        <table style="border-collapse:collapse; width:100%;">
          <thead>
            <tr>
              <th style="text-align:left;">Color</th>
              <th style="text-align:left;">HEX</th>
              <th style="text-align:left;">ΔE</th>
            </tr>
          </thead>
          <tbody>
            ${nearestRows}
          </tbody>
        </table>
      `;

      // re-bind dropdown
      document.getElementById("colorDropdown").addEventListener("change", e => {
        currentSet = e.target.value;
        localStorage.setItem("currentSet", currentSet); // remember selection
        updateClosestColors(color);
      });
    }

    async function init() {
      // Load paints JSON
      //const resp = await fetch("paints.json");
      //paints = await resp.json();

      const search = document.getElementById("search");
      search.addEventListener("change", e => updateColor(e.target.value));

      // Enter key triggers
      search.addEventListener("keydown", e => {
        if (e.key === "Enter") {
          e.preventDefault(); // stop the form from submitting/reloading
          updateColor(search.value);
        }
      });

      // Also on blur / change
      search.addEventListener("change", e => updateColor(e.target.value));

      // Load from URL if present
      const params = new URLSearchParams(window.location.search);
      if (params.has("q")) {
        const q = params.get("q");
        search.value = q;
        updateColor(q);
      }
    }

    init();
  </script>
</body>
</html>
